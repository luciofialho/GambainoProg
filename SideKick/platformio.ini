; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = .
build_dir = c:\ArduinoCompile\Sidekick

[env:Sidekick]
platform = espressif32@6.4.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
upload_port = COM5
monitor_port = COM5
lib_deps = 
	adafruit/Adafruit SSD1306@^2.5.7
	adafruit/Adafruit GFX Library@^1.11.3
	mbed-thechrisyd/RCSwitch @ 0.0.0+sha.6f4be1a7962c
	crankyoldgit/IRremoteESP8266@^2.8.6
	esphome/ESPAsyncWebServer-esphome@^3.2.2  
  sui77/rc-switch@^2.6.4
lib_extra_dirs = a:\Nuvem\Gambaino\Prog\Common
build_flags =
  -DAPP_PROJECT_NAME='"Sidekick"'
board_build.filesystem = littlefs
extra_scripts = post:../Common/patch_project_name.py
custom_project_name = Sidekick
